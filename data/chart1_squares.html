<!-- ═══════════════════════════════════════════════════
     CHART 1 — Proportional Album Art Square Chart
     Replace the chart-card div containing id="chart1"
     with this entire block
═══════════════════════════════════════════════════ -->

<div class="chart-card">
  <p class="chart-card-title">Australian artists by global streams</p>
  <p class="chart-card-sub">Square size = total global streams · Spotify Top 200 · 2017–2021 · Hover for details</p>

  <div id="squarechart" style="width:100%; position:relative;"></div>

  <!-- tooltip -->
  <div id="sq-tooltip" style="
    display:none;
    position:fixed;
    background:rgba(10,10,10,0.92);
    border:0.5px solid rgba(29,185,84,0.3);
    border-radius:10px;
    padding:12px 16px;
    pointer-events:none;
    z-index:9999;
    min-width:180px;
    backdrop-filter:blur(12px);
  ">
    <p id="sq-tt-name"  style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#f0ede6;margin:0 0 4px;"></p>
    <p id="sq-tt-streams" style="font-family:'DM Sans',sans-serif;font-size:12px;color:#1DB954;margin:0 0 2px;"></p>
    <p id="sq-tt-countries" style="font-family:'DM Sans',sans-serif;font-size:11px;color:#5a5a54;margin:0;"></p>
  </div>
</div>

<script>
(function() {

  /* ── Data: only artists we have images for ─────────── */
  const artists = [
    { name: "The Kid LAROI",        file: "the-kid-laroi.jpg",        streams: 3962757308, countries: 68 },
    { name: "Sia",                  file: "sia.jpg",                   streams: 1022568138, countries: 68 },
    { name: "5 Seconds of Summer",  file: "5-seconds-of-summer.jpg",   streams: 2162611293, countries: 63 },
    { name: "Troye Sivan",          file: "troye-sivan.jpg",           streams: 247701852,  countries: 54 },
    { name: "Kylie Minogue",        file: "kylie-minogue.jpg",         streams: 148300325,  countries: 44 },
    { name: "Vance Joy",            file: "vance-joy.jpg",             streams: 457275369,  countries: 35 },
    { name: "Bag Raiders",          file: "bag-raiders.jpg",           streams: 29525352,   countries: 24 },
    { name: "FISHER",               file: "fisher.jpg",                streams: 14344410,   countries: 15 },
  ];

  /* sort biggest first */
  artists.sort((a, b) => b.streams - a.streams);

  const container = document.getElementById('squarechart');
  const tooltip   = document.getElementById('sq-tooltip');
  const ttName    = document.getElementById('sq-tt-name');
  const ttStreams  = document.getElementById('sq-tt-streams');
  const ttCountries = document.getElementById('sq-tt-countries');

  /* ── Layout calculation ────────────────────────────── */
  function buildChart() {
    container.innerHTML = '';

    const W         = container.offsetWidth || 800;
    const maxStreams = artists[0].streams;

    /* max square = 45% of container width */
    const maxSize   = Math.min(W * 0.45, 340);
    const minSize   = 60;

    /* scale: area proportional to streams */
    const sizes = artists.map(a => {
      const ratio = Math.sqrt(a.streams / maxStreams);
      return Math.max(minSize, Math.round(ratio * maxSize));
    });

    /* wrap div — flexbox row wrap */
    const wrap = document.createElement('div');
    wrap.style.cssText = `
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      padding: 8px 0 16px;
    `;

    artists.forEach((artist, i) => {
      const size = sizes[i];
      const imgPath = `data/images/${artist.file}`;

      /* outer tile */
      const tile = document.createElement('div');
      tile.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        flex-shrink: 0;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 0 0 0.5px rgba(255,255,255,0.08);
      `;

      /* album art */
      const img = document.createElement('img');
      img.src = imgPath;
      img.alt = artist.name;
      img.style.cssText = `
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: brightness(0.72);
        transition: filter 0.2s ease;
      `;

      /* fallback bg if image missing */
      img.onerror = () => {
        tile.style.background = '#1a1a1a';
        img.style.display = 'none';
      };

      /* gradient overlay — always visible at bottom */
      const overlay = document.createElement('div');
      overlay.style.cssText = `
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0,0,0,0.85) 0%,
          rgba(0,0,0,0.2) 45%,
          transparent 100%
        );
        pointer-events: none;
      `;

      /* artist name label */
      const label = document.createElement('div');
      const fontSize = size < 100 ? '9px' : size < 140 ? '11px' : '13px';
      label.style.cssText = `
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: ${size < 100 ? '6px' : '10px'};
        font-family: 'DM Sans', sans-serif;
        font-size: ${fontSize};
        font-weight: 500;
        color: #f0ede6;
        line-height: 1.2;
        pointer-events: none;
      `;
      label.textContent = artist.name;

      /* green accent line at bottom */
      const accent = document.createElement('div');
      accent.style.cssText = `
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: #1DB954;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
      `;

      /* streams badge — top right, only on larger tiles */
      if (size >= 120) {
        const badge = document.createElement('div');
        const billions = artist.streams / 1e9;
        const label2 = billions >= 1
          ? `${billions.toFixed(1)}B`
          : `${(artist.streams / 1e6).toFixed(0)}M`;
        badge.style.cssText = `
          position: absolute;
          top: 8px;
          right: 8px;
          background: rgba(29,185,84,0.15);
          border: 0.5px solid rgba(29,185,84,0.4);
          border-radius: 20px;
          padding: 2px 8px;
          font-family: 'DM Sans', sans-serif;
          font-size: 10px;
          font-weight: 500;
          color: #1DB954;
          pointer-events: none;
          backdrop-filter: blur(4px);
        `;
        badge.textContent = label2;
        tile.appendChild(badge);
      }

      /* hover effects */
      tile.addEventListener('mouseenter', (e) => {
        tile.style.transform = 'scale(1.04)';
        tile.style.boxShadow = '0 0 0 1.5px rgba(29,185,84,0.5), 0 8px 32px rgba(0,0,0,0.6)';
        img.style.filter = 'brightness(0.9)';
        accent.style.opacity = '1';

        /* tooltip */
        const billions = artist.streams / 1e9;
        ttName.textContent = artist.name;
        ttStreams.textContent = billions >= 1
          ? `${billions.toFixed(2)}B global streams`
          : `${(artist.streams / 1e6).toFixed(1)}M global streams`;
        ttCountries.textContent = `Charted in ${artist.countries} countries`;
        tooltip.style.display = 'block';
      });

      tile.addEventListener('mousemove', (e) => {
        tooltip.style.left = (e.clientX + 16) + 'px';
        tooltip.style.top  = (e.clientY - 60) + 'px';
      });

      tile.addEventListener('mouseleave', () => {
        tile.style.transform = 'scale(1)';
        tile.style.boxShadow = '0 0 0 0.5px rgba(255,255,255,0.08)';
        img.style.filter = 'brightness(0.72)';
        accent.style.opacity = '0';
        tooltip.style.display = 'none';
      });

      tile.appendChild(img);
      tile.appendChild(overlay);
      tile.appendChild(label);
      tile.appendChild(accent);
      wrap.appendChild(tile);
    });

    container.appendChild(wrap);

    /* ── Legend ──────────────────────────────────────── */
    const legend = document.createElement('div');
    legend.style.cssText = `
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: #5a5a54;
      flex-wrap: wrap;
    `;

    /* size legend */
    const sizeLeg = document.createElement('div');
    sizeLeg.style.cssText = 'display:flex;align-items:center;gap:8px;';
    sizeLeg.innerHTML = `
      <div style="display:flex;align-items:flex-end;gap:4px;">
        <div style="width:10px;height:10px;border:0.5px solid rgba(255,255,255,0.2);border-radius:2px;"></div>
        <div style="width:18px;height:18px;border:0.5px solid rgba(255,255,255,0.2);border-radius:2px;"></div>
        <div style="width:26px;height:26px;border:0.5px solid rgba(255,255,255,0.2);border-radius:2px;"></div>
      </div>
      <span>Square area = global streams</span>
    `;

    const hoverLeg = document.createElement('div');
    hoverLeg.textContent = 'Hover for stream count · More artists added as images collected';

    legend.appendChild(sizeLeg);
    legend.appendChild(hoverLeg);
    container.appendChild(legend);
  }

  /* build on load + on resize */
  buildChart();
  window.addEventListener('resize', () => {
    clearTimeout(window._sqResize);
    window._sqResize = setTimeout(buildChart, 200);
  });

})();
</script>
